issuer: 'SiteHosting and Design'
keywords:
  - 'Site\s*Hosting\s+and\s+Design'
  - 'Factuurdatum\s*:\s*[0-9]{2}-[0-9]{2}-[0-9]{4}'
  - 'Totaal\s+\(incl\.\s+BTW\)\s+€\s*[0-9.,]+'
fields:
  invoice_number: 'Factuur\s*[:#-]?\s*([A-Z0-9][A-Z0-9/._-]+)'
  date: 'Factuurdatum\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: 'Totaal\s+\(incl\.\s+BTW\)\s*[:#-]?\s*(?:EUR|€)?\s*([0-9.,]+)'
  currency_code: 'Totaal\s+\(incl\.\s+BTW\)\s*[:#-]?\s*((?:EUR|€))\s*[0-9.,]+'
options:
  date_formats:
    - '%d-%m-%Y'
    - '%d/%m/%Y'
    - '%Y-%m-%d'
  remove_whitespace: true
