  date: '(?i)(?<!\w)non(?!\w)\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: '(?i)(?<!\w)Totaal\s+Icnl:(?!\w)\s*[:#-]?\s*(?:EUR|€)?\s*([0-9]{1,3}(?:[.,][0-9]{3})*[.,][0-9]{2}|[0-9]+[.,][0-9]{2})'
