issuer: 'Croco shop'
keywords:
  - 'Croco\s+shop'
  - 'ke\s+03887323\s+\~\s+BTW\s+NL10093674500%'
  - 'omschrijving\s+Aantal\s+Prijs\s+_\s+Korting\s+Btw\s+Bedrag'
fields:
  invoice_number: 'Factuur\s*[:#-]?\s*([A-Z0-9][A-Z0-9/._-]+)'
  date: 'Factuurdatum\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: 'Totaal\s*[:#-]?\s*(?:EUR|€)?\s*([0-9.,]+)'
  currency_code: 'Valuta\s*[:#-]?\s*((€))'
options:
  date_formats:
    - '%d-%m-%Y'
    - '%d/%m/%Y'
    - '%Y-%m-%d'
  remove_whitespace: true
