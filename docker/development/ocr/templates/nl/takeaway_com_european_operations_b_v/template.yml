issuer: 'takeaway_com_european_operations_b_v'
keywords:
  - '(?i)NL405831900B01'
  - '(?i)thuisbezorgd\.nl'
  - '(?i)restaurants\.thuisbezorgd\.nl'
fields:
  invoice_number: '(?i)(?<!\w)Factuurnummer(?!\w)\s*[:#-]?\s*((?=[A-Z0-9/._-]*\d)[A-Z0-9][A-Z0-9/._-]+)'
  date: '(?i)(?<!\w)Datum(?!\w)\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: '(?i)(?<!\w)Subtotaal(?!\w)\s*[:#-]?\s*(?:EUR|€)?\s*([0-9]{1,3}(?:[.,][0-9]{3})*[.,][0-9]{2}|[0-9]+[.,][0-9]{2})'
  currency_code: '(?i)((?:EUR|€))'
options:
  date_formats:
    - '%d-%m-%Y'
    - '%d/%m/%Y'
    - '%Y-%m-%d'
  remove_whitespace: true
