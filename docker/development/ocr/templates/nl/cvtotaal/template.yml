issuer: 'Cvtotaal'
keywords:
  - '(?i)Cvtotaal'
fields:
  invoice_number: '(?i)(?<!\w)Factuurnummer(?!\w)\s*[:#-]?\s*((?=[A-Z0-9/._-]*\d)[A-Z0-9][A-Z0-9/._-]+)'
  date: '(?i)(?<!\w)Factuurdatum(?!\w)\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: '(?i)(?<!\w)Totaal\s+incl\.\s+BTW(?!\w)[\s\S]{0,120}?(?:EUR|€)?\s*([0-9]{1,3}(?:[.,][0-9]{3})*[.,][0-9]{2}|[0-9]+[.,][0-9]{2})'
  currency_code: '(?i)((?:EUR|€))'
options:
  date_formats:
    - '%d-%m-%Y'
    - '%d/%m/%Y'
    - '%Y-%m-%d'
  remove_whitespace: true
