issuer: 'ROELEVEL ROLIK'
keywords:
  - '(?i)EREN'
fields:
  invoice_number: '(?i)(?<!\w)Bonnnummer(?!\w)\s*[:#-]?\s*((?=[A-Z0-9/._-]*\d)[A-Z0-9][A-Z0-9/._-]+)'
  date: '(?i)(?<!\w)Datum(?!\w)\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: '(?i)(?<!\w)Totaal\s+\(incl\.\s+BTW\)(?!\w)\s*[:#-]?\s*(?:EUR|€)?\s*([0-9]{1,3}(?:[.,][0-9]{3})*[.,][0-9]{2}|[0-9]+[.,][0-9]{2})'
  currency_code: '(?i)(?<!\w)Valuta(?!\w)\s*[:#-]?\s*((?:EUR|€))'
options:
  date_formats:
    - '%d-%m-%Y'
    - '%d/%m/%Y'
    - '%Y-%m-%d'
  remove_whitespace: true
