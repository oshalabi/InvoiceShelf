issuer: 'Onbekend'
keywords:
  - 'Onbekend'
  - 'BTW\s+nummer:\s+NL0123456789B01'
  - 'Totaal\s+excl\.\s+BTW\s+€\s+771,50'
fields:
  invoice_number: 'Factuurnummer\s*[:#-]?\s*([A-Z0-9][A-Z0-9/._-]+)'
  date: 'Factuurdatum\s*[:#-]?\s*([0-9]{2}[./-][0-9]{2}[./-][0-9]{4})'
  amount: 'Totaal\s+incl\.\s+BTW\s*[:#-]?\s*(?:EUR|€)?\s*([0-9.,]+)'
  currency_code: '€\s*[:#-]?\s*((€))'
options:
  date_formats:
    - '%d-%m-%Y'
    - '%d/%m/%Y'
    - '%Y-%m-%d'
  remove_whitespace: true
