services:
  php-fpm:
    container_name: invoiceshelf-dev-php
    build:
      context: ../../
      dockerfile: docker/development/Dockerfile
      args:
        - UID=${USRID:-1000}
        - GID=${GRPID:-1000}
      target: development
    environment:
      OCR_BASE_URL: ${OCR_BASE_URL:-http://ocr:8080/extract}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_TIMEOUT: ${OCR_TIMEOUT:-15}
    volumes:
      - ../../:/var/www/html
    networks:
      - invoiceshelf-dev

  nginx:
    container_name: invoiceshelf-dev-nginx
    build:
      context: ../../
      dockerfile: docker/development/nginx.Dockerfile
    environment:
      - "PHP_FPM_HOST=php-fpm:9000"
    ports:
      - "80:80"
    volumes:
      - ../../:/var/www/html
    networks:
      invoiceshelf-dev:
        aliases:
          - invoiceshelf.test

  db:
    image: mariadb:10.9
    container_name: invoiceshelf-dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: invoiceshelf
      MYSQL_DATABASE: invoiceshelf
      MYSQL_USER: invoiceshelf
      MYSQL_PASSWORD: invoiceshelf
    ports:
      - "3306:3306"
    volumes:
      - invoiceshelf-dev-mysql:/var/lib/mysql
    networks:
      - invoiceshelf-dev

  adminer:
    container_name: invoiceshelf-dev-adminer
    build:
      context: ../../
      dockerfile: docker/development/adminer/Dockerfile
    environment:
      ADMINER_PLUGINS: tables-filter
      ADMINER_DESIGN: konya
    ports:
      - "8080:8080"
    networks:
      - invoiceshelf-dev

  mail:
    container_name: invoiceshelf-dev-mailpit
    image: axllent/mailpit:latest
    restart: always
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - invoiceshelf-dev
  minio:
    container_name: invoiceshelf-dev-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-invoiceshelf}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-invoiceshelf123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - invoiceshelf-dev-minio:/data
    networks:
      - invoiceshelf-dev
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-invoiceshelf}" "${MINIO_ROOT_PASSWORD:-invoiceshelf123}"; do
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-invoiceshelf-local}
    networks:
      - invoiceshelf-dev

  ocr:
    container_name: invoiceshelf-dev-ocr
    build:
      context: ./ocr
      dockerfile: Dockerfile
    environment:
      OCR_TEMPLATE_DIR: /app/templates
      OCR_DEFAULT_COUNTRY_CODE: NL
      OCR_DEFAULT_LANGUAGE: eng
      OCR_DUTCH_LANGUAGE: nld+eng
    expose:
      - "8080"
    ports:
      - "4562:8080"
    volumes:
      - ./ocr/templates:/app/templates
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - invoiceshelf-dev

networks:
  invoiceshelf-dev:

volumes:
  invoiceshelf-dev-mysql:
  invoiceshelf-dev-minio:
